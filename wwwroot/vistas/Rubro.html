<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubro</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body class="bg1">

<div id="navbar"></div>

<!-- Tabla -->
<div class="container mt-4">
    <h1>Rubro</h1>
    <hr>

      <!-- BOTÓN -->
      <button class="btn btn-success mb-3" onclick="AbrirModalCrearRubro()">Agregar</button>

    <table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>Id</th>
            <th>Descripción</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody id="TodosLosRubros"></tbody>
</table>
</div>



<!-- MODAL -->
<div class="modal fade" id="ModalRubro" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content text-dark">
            <div class="modal-header">
                <h5 id="TituloModalRubro">
                    Crear Rubro
                </h5>
                <button class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="RubroId">

                <label class="form-label">Descripción</label>
                <input type="text" id="Descripcion" class="form-control">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary" onclick="GuardarRubro()">Guardar</button>
            </div>
        </div>
    </div>
</div>
                    


<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="../js/Rubro.js"></script>

<script>
    window.onload = ObtenerRubros;
</script>

<script>
fetch("componentes/navbar.html")
.then(response => response.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

</body>
</html>
