<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Materiales

    </title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Estilos propios -->
    <link rel="stylesheet" href="../css/Style.css">
</head>

<body class="bg1">

<div id="navbar"></div>

<!-- Tabla -->
<div class="container mt-4">
    <h1>Materiales</h1>
    <hr>

    <button class="btn btn-success mb-3" onclick="AbrirModalCrear()">Agregar</button>

    <table class="table table-dark table-striped">
    <thead>
        <tr>
            <th>Id</th>
            <th>Descripcion</th>
            <th>Rubro</th>
            <th>Precio costo</th>
            <th></th>
            <th></th>
        </tr>
    </thead>
    <tbody id="TodosLosMateriales"></tbody>
</table>
</div>


<!-- MODAL AGREGAR / EDITAR -->
<div class="modal fade" id="Modalmaterial" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content text-dark">
            <div class="modal-header">
                <h5 id="TituloModal">Crear Material</h5>
                <button class="btn-close"
                        data-bs-dismiss="modal">
                </button>
            </div>
                <div class="modal-body">
                    <input type="hidden" id="MaterialId">

                    <label class="form-label">Descripcion</label>
                    <input type="text" id="Descripcion" class="form-control">

                    <label class="form-label mt-2">Rubro</label>
                    <input type="text" id="Rubro" class="form-control">

                    <label class="form-label mt-2">Precio costo</label>
                    <input type="number" id="PrecioCosto" class="form-control">

                </div>

            <div class="modal-footer">
                <button class="btn btn-primary"onclick="GuardarMaterial()">Guardar</button>
            </div>
        </div>
    </div>
</div>



<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="../js/Materiales.js"></script>

<script>
    window.onload = ObtenerMateriales;
</script>

<script>
fetch("componentes/navbar.html")
.then(response => response.text())
.then(data => {
    document.getElementById("navbar").innerHTML = data;
});
</script>

</body>
</html>
